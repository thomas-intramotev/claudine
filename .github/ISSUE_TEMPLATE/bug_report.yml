name: Bug Report
description: Report a bug in Claudine
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open VS Code with a workspace
        2. Open the Claudine panel
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      placeholder: e.g. 1.96.0
    validations:
      required: true

  - type: input
    id: claudine-version
    attributes:
      label: Claudine Version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code Extension Version
      placeholder: e.g. 1.0.0

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Copy any relevant output from the Output panel (select "Claudine" from the dropdown).
      render: shell
