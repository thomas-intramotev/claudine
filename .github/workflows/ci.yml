name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install extension dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd webview && npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run compile:check

      - name: Unit tests
        run: npm test

      - name: Build extension
        run: npm run compile

      - name: Build webview
        run: npm run build:webview

      - name: Package VSIX
        run: ./tools/package-vsix.sh
        if: matrix.node-version == 22 && runner.os != 'Windows'
        shell: bash

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudine-vsix-${{ matrix.os }}
          path: '*.vsix'
        if: matrix.node-version == 22 && runner.os != 'Windows'
